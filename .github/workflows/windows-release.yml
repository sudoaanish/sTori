name: Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Test frontend
        run: npm test

      - name: Build frontend resources
        run: npm run build

      - name: Test Rust server
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Build signed installer and draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: sTori ${{ github.ref_name }}
          releaseBody: |
            ## sTori ${{ github.ref_name }}

            A private ebook server and reading room for your Windows PC and iPhone.

            - Download and run the Windows `.exe` installer.
            - Launch sTori, add a book library, then scan the QR code with your iPhone.
            - Updates are signed and can be installed from inside the desktop app.
          releaseDraft: true
          prerelease: false
          args: --bundles nsis
          updaterJsonPreferNsis: true

      - name: Write checksums
        shell: pwsh
        run: |
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not produced." }
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content "src-tauri/target/release/bundle/nsis/SHA256SUMS.txt"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stori-windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/release/bundle/nsis/SHA256SUMS.txt
            THIRD_PARTY_FONTS.md
          if-no-files-found: error

      - name: Attach verification files to the draft release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload "${{ github.ref_name }}" `
            "src-tauri/target/release/bundle/nsis/SHA256SUMS.txt" `
            "THIRD_PARTY_FONTS.md" `
            --clobber
